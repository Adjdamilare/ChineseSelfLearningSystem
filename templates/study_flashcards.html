<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Flashcards - Chinese Learning</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <div class="logo-icon">中</div>
                    <span>Chinese Learning</span>
                </a>
                <div class="nav-links">
                    <a href="/dashboard" class="btn">Dashboard</a>
                    <a href="/search" class="btn">Search Words</a>
                    <a href="/flashcard-study" class="btn">Flashcards</a>
                    <a href="/study-flashcards" class="btn" style="background: var(--accent); color: white;">Study</a>
                    <a href="/flashcards" class="btn">Progress</a>
                    <a href="/profile" class="btn"><i class="fas fa-user"></i> Profile</a>
                    <a href="/logout" class="btn btn-secondary">Logout</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="study-container">
                <!-- Stats Bar -->
                <div class="stats-bar fade-in">
                    <div class="stat-item">
                        <div class="stat-value" id="correct-count">0</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="incorrect-count">0</div>
                        <div class="stat-label">Incorrect</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="streak-count">0</div>
                        <div class="stat-label">Streak</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="progress-text">0 studied</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>

                <!-- Study Area -->
                <div id="study-area">
                    <div class="flashcard-study fade-in">
                        <div class="word-level" style="position: absolute; top: 1.5rem; right: 1.5rem;">
                            <span class="level-badge level-1" id="word-level">HSK 1</span>
                        </div>
                        
                        <div class="streak-badge" id="streak-badge" style="display: none;">
                            <i class="fas fa-fire"></i> <span id="streak-display">0</span> streak
                        </div>

                        <div class="hard-queue-indicator" id="hard-queue-indicator" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> <span id="hard-queue-count">0</span> words to review
                        </div>

                        <div class="word-display">
                            <div class="word-hanzi" id="word-hanzi">你好</div>
                        </div>

                        <button class="btn-play" onclick="playPronunciation()" title="Play pronunciation" style="margin: 1rem 0;">
                            <i class="fas fa-volume-up"></i>
                        </button>

                        <!-- Answer Input Area -->
                        <div class="answer-area" id="answer-area">
                            <input type="text" class="answer-input" id="answer-input" 
                                   placeholder="Type the English meaning..." autocomplete="off">
                            <button class="btn btn-lg" onclick="submitAnswer()" style="width: 100%;">
                                <i class="fas fa-check"></i> Submit Answer
                            </button>
                        </div>

                        <!-- Result Area -->
                        <div class="result-area" id="result-area">
                            <div id="result-message"></div>
                            
                            <div class="correct-answer">
                                <div class="correct-pinyin" id="correct-pinyin"></div>
                                <div class="correct-english" id="correct-english"></div>
                                <div class="pos" id="correct-pos"></div>
                            </div>

                            <div class="difficulty-buttons" id="difficulty-buttons" style="display: none;">
                                <button class="btn btn-hard" onclick="rateDifficulty('hard')">
                                    <i class="fas fa-fire"></i> Hard
                                </button>
                                <button class="btn btn-fair" onclick="rateDifficulty('fair')">
                                    <i class="fas fa-minus"></i> Fair
                                </button>
                                <button class="btn btn-easy" onclick="rateDifficulty('easy')">
                                    <i class="fas fa-check"></i> Easy
                                </button>
                            </div>

                            <button class="btn btn-lg" id="continue-btn" onclick="continueToNext()" style="display: none;">
                                <i class="fas fa-arrow-right"></i> Continue
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Session Complete -->
                <div class="session-complete card" id="session-complete" style="display: none;">
                    <div style="font-size: 4rem; color: var(--success); margin-bottom: 1rem;">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <h2>Session Complete!</h2>
                    <p style="color: var(--text-secondary); margin: 1rem 0;">Great job! Here's your progress:</p>
                    
                    <div class="stats-bar" style="margin: 2rem 0;">
                        <div class="stat-item">
                            <div class="stat-value" id="session-total">0</div>
                            <div class="stat-label">Total Words</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="session-correct">0</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="session-incorrect">0</div>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="level-num">1</div>
                            <div class="stat-label">Current Level</div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;">
                        <a href="/study-flashcards" class="btn btn-lg">
                            <i class="fas fa-redo"></i> Study Again
                        </a>
                        <a href="/flashcards" class="btn btn-lg btn-secondary">
                            <i class="fas fa-chart-bar"></i> View Progress
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        // Study session state
        let currentWord = null;
        let sessionStats = {
            total: 0,
            correct: 0,
            incorrect: 0,
            streak: 0,
            maxStreak: 0
        };
        let studiedWords = [];
        let hardWordsQueue = [];
        let currentLevel = 1;

        // Load initial word on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadNextWord();
            
            // Enter key to submit answer
            const answerInput = document.getElementById('answer-input');
            if (answerInput) {
                answerInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        submitAnswer();
                    }
                });
            }
        });

        // Load the next word to study
        async function loadNextWord() {
            try {
                const response = await fetch('/api/study/next-word');
                const data = await response.json();

                if (!data.word) {
                    showSessionComplete();
                    return;
                }

                currentWord = data.word;
                
                // Update UI
                document.getElementById('word-hanzi').textContent = currentWord.hanzi;
                document.getElementById('word-level').textContent = `HSK ${currentWord.level}`;
                document.getElementById('word-level').className = `level-badge level-${currentWord.level}`;
                
                // Update streak badge
                if (currentWord.current_streak > 0) {
                    document.getElementById('streak-badge').style.display = 'inline-flex';
                    document.getElementById('streak-display').textContent = currentWord.current_streak;
                } else {
                    document.getElementById('streak-badge').style.display = 'none';
                }

                // Reset to answer input
                document.getElementById('answer-area').style.display = 'block';
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').focus();
                document.getElementById('result-area').classList.remove('show');
                document.getElementById('difficulty-buttons').style.display = 'none';
                document.getElementById('continue-btn').style.display = 'none';

                // Update progress
                sessionStats.total = studiedWords.length;
                updateProgress();

                // Check for hard words queue
                if (hardWordsQueue.length > 0) {
                    document.getElementById('hard-queue-indicator').style.display = 'inline-flex';
                    document.getElementById('hard-queue-count').textContent = hardWordsQueue.length;
                } else {
                    document.getElementById('hard-queue-indicator').style.display = 'none';
                }

            } catch (error) {
                console.error('Error loading word:', error);
                showToast('Failed to load word. Please try again.', 'error');
            }
        }

        // Submit answer
        function submitAnswer() {
            const userAnswer = document.getElementById('answer-input').value.trim();
            
            if (!userAnswer) {
                showToast('Please enter an answer', 'warning');
                return;
            }

            // Check if answer is correct (simple matching)
            const correctAnswer = currentWord.english.toLowerCase();
            const isCorrect = checkAnswer(userAnswer.toLowerCase(), correctAnswer);

            // Update stats
            sessionStats.total++;
            studiedWords.push(currentWord.id);

            if (isCorrect) {
                sessionStats.correct++;
                sessionStats.streak++;
                sessionStats.maxStreak = Math.max(sessionStats.maxStreak, sessionStats.streak);
            } else {
                sessionStats.incorrect++;
                sessionStats.streak = 0;
                hardWordsQueue.push(currentWord.id);
            }

            // Update UI
            updateStats();
            showResult(isCorrect);
        }

        // Check if answer matches (flexible matching)
        function checkAnswer(userAnswer, correctAnswer) {
            // Split correct answer by common separators
            const answers = correctAnswer.split(/[,;\/]/).map(a => a.trim().toLowerCase());
            
            // Check if any part of the correct answer matches
            return answers.some(answer => {
                // Remove common words for matching
                const cleanAnswer = answer.replace(/^(to\s+)?be\s+/, '').trim();
                return userAnswer.includes(cleanAnswer) || cleanAnswer.includes(userAnswer);
            });
        }

        // Show result
        function showResult(isCorrect) {
            document.getElementById('answer-area').style.display = 'none';
            
            const resultArea = document.getElementById('result-area');
            resultArea.classList.add('show');

            const resultMessage = document.getElementById('result-message');
            if (isCorrect) {
                resultMessage.innerHTML = '<h3 class="result-correct"><i class="fas fa-check-circle"></i> Correct!</h3>';
                document.getElementById('difficulty-buttons').style.display = 'none';
                document.getElementById('continue-btn').style.display = 'inline-block';
            } else {
                resultMessage.innerHTML = '<h3 class="result-incorrect"><i class="fas fa-times-circle"></i> Incorrect</h3>';
                document.getElementById('difficulty-buttons').style.display = 'flex';
                document.getElementById('continue-btn').style.display = 'none';
            }

            // Show correct answer
            document.getElementById('correct-pinyin').textContent = currentWord.pinyin;
            document.getElementById('correct-english').textContent = currentWord.english;
            document.getElementById('correct-pos').textContent = currentWord.pos;
        }

        // Rate difficulty (for incorrect answers)
        async function rateDifficulty(difficulty) {
            try {
                const formData = new FormData();
                formData.append('word_id', currentWord.id);
                formData.append('difficulty', difficulty);
                formData.append('is_correct', 'false');

                const response = await fetch('/api/study/record', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Failed to record difficulty');
                }

                document.getElementById('difficulty-buttons').style.display = 'none';
                document.getElementById('continue-btn').style.display = 'inline-block';

            } catch (error) {
                console.error('Error recording difficulty:', error);
                showToast('Failed to save progress', 'error');
            }
        }

        // Continue to next word
        async function continueToNext() {
            try {
                const userAnswer = document.getElementById('answer-input').value.trim();
                const isCorrect = checkAnswer(userAnswer.toLowerCase(), currentWord.english.toLowerCase());

                const formData = new FormData();
                formData.append('word_id', currentWord.id);
                formData.append('user_answer', userAnswer);
                formData.append('is_correct', isCorrect.toString());

                const response = await fetch('/api/study/record', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Failed to record answer');
                }
            } catch (error) {
                console.error('Error recording answer:', error);
                showToast('Failed to save progress', 'error');
            }

            // Check if we should show a hard word from the queue (every 4 words)
            if (hardWordsQueue.length > 0 && sessionStats.total % 4 === 0) {
                // Load a hard word from the queue
                const hardWordId = hardWordsQueue.shift();
                loadHardWord(hardWordId);
            } else {
                loadNextWord();
            }
        }

        // Load a specific hard word from the queue
        async function loadHardWord(wordId) {
            try {
                const response = await fetch(`/api/study/word/${wordId}`);
                const data = await response.json();

                if (data.word) {
                    currentWord = data.word;
                    
                    document.getElementById('word-hanzi').textContent = currentWord.hanzi;
                    document.getElementById('word-level').textContent = `HSK ${currentWord.level}`;
                    document.getElementById('word-level').className = `level-badge level-${currentWord.level}`;

                    document.getElementById('answer-area').style.display = 'block';
                    document.getElementById('answer-input').value = '';
                    document.getElementById('answer-input').focus();
                    document.getElementById('result-area').classList.remove('show');
                    document.getElementById('difficulty-buttons').style.display = 'none';
                    document.getElementById('continue-btn').style.display = 'none';

                    showToast('Reviewing a word you found difficult earlier', 'info');
                } else {
                    loadNextWord();
                }
            } catch (error) {
                console.error('Error loading hard word:', error);
                loadNextWord();
            }
        }

        // Update stats display
        function updateStats() {
            document.getElementById('correct-count').textContent = sessionStats.correct;
            document.getElementById('incorrect-count').textContent = sessionStats.incorrect;
            document.getElementById('streak-count').textContent = sessionStats.streak;
        }

        // Update progress display
        function updateProgress() {
            const total = studiedWords.length;
            const progress = sessionStats.total > 0 ? (sessionStats.correct / sessionStats.total * 100) : 0;
            
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${sessionStats.total} studied`;
        }

        // Play pronunciation
        function playPronunciation() {
            if (currentWord && currentWord.tts_url) {
                const audio = new Audio(currentWord.tts_url);
                audio.play().catch(error => {
                    console.error('Audio playback error:', error);
                    showToast('Failed to play audio', 'error');
                });
            }
        }

        // Show session complete
        function showSessionComplete() {
            document.getElementById('study-area').style.display = 'none';
            document.getElementById('session-complete').style.display = 'block';
            document.getElementById('hard-queue-indicator').style.display = 'none';

            document.getElementById('session-total').textContent = sessionStats.total;
            document.getElementById('session-correct').textContent = sessionStats.correct;
            document.getElementById('session-incorrect').textContent = sessionStats.incorrect;

            // Update current level
            document.getElementById('level-num').textContent = currentLevel;
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            const typeClasses = {
                'success': 'toast-success',
                'error': 'toast-error',
                'warning': 'toast-warning',
                'info': 'toast-info'
            };
            toast.className = `toast ${typeClasses[type] || typeClasses.info}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
