<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Chinese Learning</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <div class="logo-icon">中</div>
                    <span>Chinese Learning</span>
                </a>
                <div class="nav-links">
                    <a href="/login" class="btn btn-secondary">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card form-container">
                <h2 class="text-center mb-3">
                    <i class="fas fa-user-plus" style="color: var(--accent);"></i> Create Your Account
                </h2>
                
                {% if error %}
                <div class="toast toast-error" style="position: relative; bottom: auto; left: auto; transform: none; margin-bottom: 1rem;">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/register" id="register-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user" style="color: var(--accent);"></i> Username
                        </label>
                        <input type="text" id="username" name="username" required 
                               placeholder="Choose a username" minlength="3">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope" style="color: var(--accent);"></i> Email Address
                        </label>
                        <input type="email" id="email" name="email" required 
                               placeholder="your.email@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock" style="color: var(--accent);"></i> Password
                        </label>
                        <input type="password" id="password" name="password" required 
                               placeholder="Create a strong password" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">
                            <i class="fas fa-lock" style="color: var(--accent);"></i> Confirm Password
                        </label>
                        <input type="password" id="confirm_password" name="confirm_password" required 
                               placeholder="Confirm your password" minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-lg" style="width: 100%; margin-top: 0.5rem;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                
                <div class="text-center mt-2" style="color: var(--text-secondary);">
                    Already have an account? <a href="/login" style="color: var(--accent); font-weight: 500;">Login here</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        // Password confirmation validation
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm_password');
            const form = document.getElementById('register-form');
            
            form.addEventListener('submit', function(e) {
                if (passwordInput.value !== confirmPasswordInput.value) {
                    e.preventDefault();
                    showToast('Passwords do not match!', 'error');
                    confirmPasswordInput.focus();
                    return false;
                }
                
                if (passwordInput.value.length < 6) {
                    e.preventDefault();
                    showToast('Password must be at least 6 characters', 'error');
                    passwordInput.focus();
                    return false;
                }
            });
            
            // Real-time password match validation
            confirmPasswordInput.addEventListener('input', function() {
                if (passwordInput.value && this.value && passwordInput.value !== this.value) {
                    this.style.borderColor = 'var(--error)';
                } else {
                    this.style.borderColor = '';
                }
            });
        });
    </script>
</body>
</html>
